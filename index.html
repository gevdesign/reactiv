section{padding:80px 40px}
section.alt{background:var(--c-bg-alt)}
.wrap{max-width:var(--max);margin:0 auto}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:80px;align-items:center}
.two-col.reverse .col-text{order:2}
.two-col.reverse .col-img{order:1}
@media(max-width:768px){.two-col{grid-template-columns:1fr;gap:40px}}

h2{font-size:clamp(28px,4vw,40px);font-weight:800;line-height:1.1;margin-bottom:16px}
h3{font-size:18px;font-weight:700;margin-bottom:6px}
.section-label{font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--c-sub);margin-bottom:12px}
.section-sub{font-size:16px;color:var(--c-sub);line-height:1.6;max-width:520px;margin-bottom:32px}
.section-sub-sm{font-size:14px;color:var(--c-sub);line-height:1.6;max-width:440px;margin-top:16px}

/* image placeholder */
.img-placeholder{
  background:var(--c-bg-alt);border:1px solid var(--c-border);
  border-radius:8px;aspect-ratio:4/3;
  display:flex;align-items:center;justify-content:center;
}
.img-placeholder svg{width:48px;height:48px;opacity:.25}
section.alt .img-placeholder{background:#ebebed}

/* bullet list */
.feature-list{list-style:none;display:flex;flex-direction:column;gap:8px;margin:16px 0 24px}

function cardGrid(cards){return `<div class="card-grid">${cards.map(c=>`<div class="card"><h3>${c.h}</h3><p>${c.p}</p>${c.proof?`<p class="proof">${c.proof}</p>`:''}${c.link?`<a href="#" class="card-link" onclick="event.preventDefault();route('${c.linkHref||''}')">${c.link}</a>`:''}</div>`).join('')}</div>`;}
function whatYouGet(d){return `<div class="what-you-get"><div class="wrap"><h2>${d.headline}</h2><ul class="feature-list">${d.bullets.map(b=>`<li>${b}</li>`).join('')}</ul></div></div>`;}
function ctaBand(d){const dUrl='https://info.reactiv.ai/meetings/reactiv/reactiv-plus?uuid=146d79a9-120f-4960-8c7f-25a4632e83c7';const cUrl='https://appclip.apple.com/id?p=com.reactivapp.reactivapp-merch.Clip&action=landingPage&value=pages/clips';return `<div class="cta-band"><div class="wrap"><h2>${d.headline.replace(/\n/g,'<br>')}</h2><p>${d.sub}</p><div class="ctas"><a href="${d.cta1Url||dUrl}" class="btn btn-primary">${d.cta1}</a>${d.cta2?`<a href="${d.cta2Url||cUrl}" class="btn btn-outline-dark">${d.cta2}</a>`:''}</div></div></div>`;}
function faqSection(items){return `<div class="faq-section"><div class="wrap"><h2>Frequently asked questions</h2><div class="faq">${items.map(item=>`<div class="faq-item"><div class="faq-q" onclick="this.parentNode.classList.toggle('open')"><span>${item.q}</span><span class="ico">+</span></div><div class="faq-a">${item.a}</div></div>`).join('')}</div></div></div>`;}
function footerHTML(){return `<footer><div class="footer-inner"><div class="footer-top"><div class="footer-col"><h4>Product</h4><a onclick="route('platform')">Platform</a><a onclick="route('appclips')">App Clips</a><a onclick="route('developers')">Developers</a></div><div class="footer-col"><h4>Solutions</h4><a onclick="route('sol-ads')">Increase Ad Conversion</a><a onclick="route('sol-download')">Reduce Download Friction</a><a onclick="route('sol-retail')">Innovate at Retail</a><a onclick="route('sol-venues')">Power Venues and Events</a><a onclick="route('sol-installs')">Grow App Installs</a></div><div class="footer-col"><h4>Contact</h4><a href="#">Email</a><a href="#">LinkedIn</a><a href="#">Careers</a></div><div class="footer-col"><h4>Resources</h4><a onclick="route('customers')">Customers</a><a onclick="route('developers')">Developers</a><a href="#">Resources</a></div><div class="footer-col"><h4>Legal</h4><a href="#">Security</a><a href="#">Privacy</a><a href="#">Terms</a></div></div><div class="footer-bottom"><div class="footer-brand">${CONTENT.brand}</div><p class="footer-copy">The only enterprise platform built on App Clips.</p></div></div></footer>`;}

function buildHome(){

  p.innerHTML=heroSection(d,false)+customerLogoStrip()+
  `<section><div class="wrap"><div class="two-col"><div class="col-img">${imgP()}</div><div class="col-text"><div class="section-label">${st.label}</div><h2>${st.heading.replace(/\n/g,'<br>')}</h2><p class="section-sub-sm">${st.sub}</p><div class="stats-row" style="margin-top:32px;margin-bottom:0">${st.stats.map(s=>`<div class="stat"><div class="num">${s.num}</div><div class="label">${s.label}</div></div>`).join('')}</div></div></div></div></section>`+
  `<section class="alt"><div class="wrap"><div class="two-col"><div class="col-text"><h2>${d.section1.headline.replace(/\n/g,'<br>')}</h2><ol class="steps-list" style="margin:20px 0 28px">${d.section1.steps.map(s=>`<li>${s}</li>`).join('')}</ol><a href="${d.section1.ctaUrl}" class="btn btn-outline-dark">${d.section1.cta}</a></div><div class="col-img">${imgP()}</div></div></div></section>`+
  `<section><div class="wrap"><h2>${d.platform.headline.replace(/\n/g,'<br>')}</h2><p class="section-sub">${d.platform.sub}</p>${cardGrid(d.platform.cards)}</div></section>`+
  `<section class="alt"><div class="wrap"><div class="two-col"><div class="col-text"><h2>${d.keeps.headline.replace(/\n/g,'<br>')}</h2><p class="section-sub">${d.keeps.sub}</p><ul class="feature-list">${d.keeps.bullets.map(b=>`<li>${b}</li>`).join('')}</ul><a href="#" onclick="event.preventDefault();route('platform')" style="font-size:14px;font-weight:600;text-decoration:underline;text-underline-offset:3px">${d.keeps.link}</a></div><div class="col-img">${imgP()}</div></div></div></section>`+
  `<section class="alt"><div class="wrap" style="text-align:center"><div class="section-label">${d.numbers.sub}</div><h2>${d.numbers.headline.replace(/\n/g,'<br>')}</h2><div class="stats-row">${d.numbers.stats.map(s=>`<div class="stat"><div class="num">${s.num}</div><div class="label">${s.label}</div></div>`).join('')}</div></div></section>`+
  ctaBand(d.cta_band)+faqSection(d.faq)+footerHTML();
}

  `<section><div class="wrap" style="text-align:center"><h2>${d.integrations}</h2><p class="section-sub" style="margin:0 auto 32px">${d.intSub}</p><div class="int-row" style="justify-content:center">${d.intChips.map(c=>`<div class="int-chip">${c}</div>`).join('')}</div></div></section>`+

  stepsSection(d.steps)+
  `<section class="alt"><div class="wrap"><h2>${d.whereWins.headline}</h2><p class="section-sub">${d.whereWins.sub}</p>${cardGrid(d.whereWins.cards)}</div></section>`+
  `<section><div class="wrap"><div class="two-col"><div class="col-text"><h2>${d.scale.headline}</h2><p class="section-sub">${d.scale.sub}</p><ul class="feature-list">${d.scale.bullets.map(b=>`<li>${b}</li>`).join('')}</ul><a href="#" onclick="event.preventDefault();route('platform')" style="font-size:14px;font-weight:600;text-decoration:underline;text-underline-offset:3px">${d.scale.link}</a></div><div class="col-img">${imgP()}</div></div></div></section>`+
  `<section><div class="wrap" style="text-align:center"><h2>${d.integrations}</h2><p class="section-sub" style="margin:0 auto 32px">${d.intSub}</p><div class="int-row" style="justify-content:center">${d.intChips.map(c=>`<div class="int-chip">${c}</div>`).join('')}</div></div></section>`+
  ctaBand(d.cta_band)+faqSection(d.faq)+footerHTML();

function buildCustomers(){
  const d=CONTENT.customers,p=document.getElementById('page-customers');
  const trust=`<div class="logo-strip-section"><div class="wrap"><div class="logo-strip-label">${d.trustLabel}</div><div class="logo-strip">${d.trustPills.map(t=>`<div class="logo-pill">${t}</div>`).join('')}</div></div></div>`;
  const fb=`<div class="filter-bar" id="cust-filters">${d.filters.map((f,i)=>`<button class="filter-pill${i===0?' active':''}" data-filter="${f}">${f}</button>`).join('')}</div>`;
  const cg=`<div class="card-grid" id="cust-cards">${d.cards.map(c=>`<div class="card" data-tags="${c.tags.join(',')}"><h3>${c.client}</h3><p>${c.outcome}</p><div>${c.tags.map(t=>`<span class="card-tag">${t}</span>`).join('')}</div><p class="proof">${c.proof}</p></div>`).join('')}</div>`;
  const tr=`<section><div class="wrap"><div class="two-col"><div class="col-text"><h2>${d.transition.headline}</h2><p class="section-sub">${d.transition.sub}</p><a href="#" onclick="event.preventDefault();route('platform')" style="font-size:14px;font-weight:600;text-decoration:underline;text-underline-offset:3px">${d.transition.link}</a></div><div class="col-img">${imgP()}</div></div></div></section>`;
  p.innerHTML=heroSection(d,false)+trust+`<section><div class="wrap">${fb}${cg}</div></section>`+tr+ctaBand(d.ctaband)+faqSection(d.faq)+footerHTML();
  p.querySelector('#cust-filters').addEventListener('click',e=>{
    const btn=e.target.closest('.filter-pill');if(!btn)return;
    p.querySelectorAll('.filter-pill').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');const f=btn.dataset.filter;
    p.querySelectorAll('#cust-cards .card').forEach(card=>{card.classList.toggle('card-hidden',f!=='All'&&!card.dataset.tags.split(',').includes(f));});
  });
}
function solPage(d,key){
  const uc=d[key];
  return heroSection(d,false)+
  `<section><div class="wrap"><div class="two-col"><div class="col-text"><h2>${d.problem.headline}</h2><p class="section-sub">${d.problem.sub}</p><ul class="feature-list">${d.problem.bullets.map(b=>`<li>${b}</li>`).join('')}</ul></div><div class="col-img">${imgP()}</div></div></div></section>`+
  `<section class="alt"><div class="wrap"><div class="two-col"><div class="col-text"><h2>${d.native.headline.replace(/\n/g,'<br>')}</h2><ul class="feature-list" style="margin-top:16px">${d.native.bullets.map(b=>`<li>${b}</li>`).join('')}</ul></div><div class="col-text"><p class="section-sub-sm">${d.native.sub}</p></div></div></div></section>`+
  stepsSection(d.steps)+
  `<section class="alt"><div class="wrap"><h2>${uc.headline}</h2>${cardGrid(uc.cards)}</div></section>`+
  whatYouGet(d.get)+ctaBand(d.cta_band)+faqSection(d.faq)+footerHTML();
}

  `<section><div class="wrap"><div class="two-col"><div class="col-text"><h2>${d.scale.headline.replace(/\n/g,'<br>')}</h2><p class="section-sub">${d.scale.sub}</p><ul class="feature-list">${d.scale.bullets.map(b=>`<li>${b}</li>`).join('')}</ul><a href="https://info.reactiv.ai/meetings/reactiv/reactiv-plus?uuid=146d79a9-120f-4960-8c7f-25a4632e83c7" style="font-size:14px;font-weight:600;text-decoration:underline;text-underline-offset:3px">${d.scale.link}</a></div><div class="col-img">${imgP()}</div></div></div></section>`+
  `<section><div class="wrap" style="text-align:center"><h2>${d.integrations}</h2><p class="section-sub" style="margin:0 auto 32px">${d.intSub}</p><div class="int-row" style="justify-content:center">${d.intChips.map(c=>`<div class="int-chip">${c}</div>`).join('')}</div></div></section>`+
  ctaBand(d.cta_band)+faqSection(d.faq)+footerHTML();
}
function route(page){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  const t=document.getElementById('page-'+page);
  if(t){t.classList.add('active');window.scrollTo(0,0);}
  document.querySelectorAll('.nav-links a').forEach(a=>{const pg=a.textContent.toLowerCase().replace(/ /g,'');a.classList.toggle('active',pg===page);});
  history.pushState(null,'','#'+page);
}
buildNav();
buildDevelopers();buildCustomers();
buildSolRetail();buildSolVenues();buildSolInstalls();
buildHome();buildPlatform();buildAppClips();
buildSolDownload();buildSolAds();
const startPage=location.hash.replace('#','')||'home';
route(startPage);
window.addEventListener('popstate',()=>route(location.hash.replace('#','')||'home'));
</script>
