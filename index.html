<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<style>
:root{
--c-hero:#1c1c1e;
--c-bg:#ffffff;
--c-bg-alt:#f5f5f7;
--c-text:#111111;
--c-sub:#6e6e73;
--c-border:#e5e5e5;
--c-btn:#111111;
--c-btn-text:#fff;
--font:'Inter',sans-serif;
--max:1100px;
--r:6px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);color:var(--c-text);background:var(--c-bg);-webkit-font-smoothing:antialiased}
a{text-decoration:none;color:inherit}
nav{position:sticky;top:0;z-index:100;background:var(--c-hero);display:flex;align-items:center;justify-content:space-between;padding:0 40px;height:56px;border-bottom:1px solid rgba(255,255,255,.08)}
.nav-logo{font-weight:700;font-size:17px;color:#fff;cursor:pointer}
.nav-links{display:flex;align-items:center;gap:28px}
.nav-links a{font-size:14px;color:rgba(255,255,255,.75);font-weight:400;transition:color .15s;cursor:pointer}
.nav-links a:hover,.nav-links a.active{color:#fff}
.nav-dropdown{position:relative;cursor:pointer}
.nav-dropdown>span{font-size:14px;color:rgba(255,255,255,.75);display:flex;align-items:center;gap:4px}
.nav-dropdown>span::after{content:'▾';font-size:10px}
.dropdown-menu{display:none;position:absolute;top:100%;left:0;background:#fff;border:1px solid var(--c-border);border-radius:var(--r);padding:8px 6px 6px;min-width:280px;box-shadow:0 8px 24px rgba(0,0,0,.12)}
.nav-dropdown.open .dropdown-menu{display:block}
.dropdown-menu a{display:block;padding:8px 12px;font-size:13px;color:var(--c-text);border-radius:4px;cursor:pointer}
.dropdown-menu a:hover{background:var(--c-bg-alt);color:var(--c-text)}
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 18px;border-radius:var(--r);font-size:13px;font-weight:600;cursor:pointer;transition:opacity .15s;border:none}
.btn-primary{background:var(--c-btn);color:var(--c-btn-text)}
.btn-primary:hover{opacity:.85}
.btn-outline{background:transparent;color:#fff;border:1px solid rgba(255,255,255,.3)}
.btn-outline:hover{border-color:#fff}
.btn-outline-dark{background:transparent;color:var(--c-text);border:1px solid var(--c-border)}
.btn-outline-dark:hover{border-color:#999}
.page{display:none}
.page.active{display:block}
.hero{background:var(--c-hero);padding:80px 40px 90px;position:relative;overflow:hidden}
.hero-inner{max-width:var(--max);margin:0 auto}
.hero h1{font-size:clamp(36px,5vw,56px);font-weight:800;color:#fff;line-height:1.08;max-width:640px;margin-bottom:20px}
.hero-sub{font-size:16px;color:rgba(255,255,255,.6);max-width:500px;line-height:1.6;margin-bottom:32px}
.hero-ctas{display:flex;gap:10px;flex-wrap:wrap}
.hero-right{position:absolute;right:80px;top:50%;transform:translateY(-50%)}
.hero-qr{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:10px;padding:20px 24px;text-align:center;width:180px}
.hero-qr-box{width:100px;height:100px;background:rgba(255,255,255,.15);border-radius:6px;margin:0 auto 12px;display:flex;align-items:center;justify-content:center}
.hero-qr-box svg{opacity:.4;width:48px;height:48px}
.hero-qr p{font-size:11px;color:rgba(255,255,255,.4);line-height:1.4}
.logo-strip-section{background:var(--c-hero);border-top:1px solid rgba(255,255,255,.08);padding:28px 40px}
.logo-strip-label{font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:rgba(255,255,255,.3);text-align:center;margin-bottom:20px}
.logo-strip{display:flex;align-items:center;justify-content:center;gap:12px;flex-wrap:wrap}
.logo-pill{font-size:12px;font-weight:600;color:rgba(255,255,255,.25);background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);padding:8px 16px;border-radius:4px;letter-spacing:.04em;text-transform:uppercase}
section{padding:80px 40px}
section.alt{background:var(--c-bg-alt)}
.wrap{max-width:var(--max);margin:0 auto}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:80px;align-items:center}
.two-col.reverse .col-text{order:2}
.two-col.reverse .col-img{order:1}
@media(max-width:768px){.two-col{grid-template-columns:1fr;gap:40px}}
h2{font-size:clamp(28px,4vw,40px);font-weight:800;line-height:1.1;margin-bottom:16px}
h3{font-size:18px;font-weight:700;margin-bottom:6px}
.section-label{font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--c-sub);margin-bottom:12px}
.section-sub{font-size:16px;color:var(--c-sub);line-height:1.6;max-width:520px;margin-bottom:32px}
.section-sub-sm{font-size:14px;color:var(--c-sub);line-height:1.6;max-width:440px;margin-top:16px}
.img-placeholder{background:var(--c-bg-alt);border:1px solid var(--c-border);border-radius:8px;aspect-ratio:4/3;display:flex;align-items:center;justify-content:center}
.img-placeholder svg{width:48px;height:48px;opacity:.25}
section.alt .img-placeholder{background:#ebebed}
.feature-list{list-style:none;display:flex;flex-direction:column;gap:8px;margin:16px 0 24px}
.feature-list li{font-size:15px;padding-left:20px;position:relative;line-height:1.5}
.feature-list li::before{content:'·';position:absolute;left:0;color:var(--c-sub);font-size:18px;line-height:1.3}
.steps-wrap{display:grid;grid-template-columns:1fr 1fr;gap:60px;align-items:start}
.steps-label{font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--c-sub);margin-bottom:20px}
.steps-list{list-style:none;counter-reset:step;display:flex;flex-direction:column;gap:0}
.steps-list li{counter-increment:step;font-size:20px;font-weight:700;padding:20px 0;border-bottom:1px solid var(--c-border);display:flex;align-items:center;gap:16px}
.steps-list li::before{content:counter(step)".";color:var(--c-sub);font-weight:400;font-size:20px;min-width:28px}
.steps-note{font-size:14px;color:var(--c-sub);margin-top:16px;line-height:1.5}
.card-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:0;border-top:1px solid var(--c-border);border-left:1px solid var(--c-border)}
.card{padding:28px 24px;border-right:1px solid var(--c-border);border-bottom:1px solid var(--c-border)}
.card h3{font-size:15px;font-weight:700;margin-bottom:6px}
.card p{font-size:13px;color:var(--c-sub);line-height:1.5}
.card .proof{font-size:12px;color:var(--c-sub);margin-top:8px;font-style:italic}
.card .card-link{font-size:13px;font-weight:600;text-decoration:underline;text-underline-offset:3px;margin-top:8px;display:inline-block}
.what-you-get{padding:80px 40px;background:var(--c-hero)}
.what-you-get h2{color:#fff}
.what-you-get .feature-list li{color:rgba(255,255,255,.7)}
.what-you-get .feature-list li::before{color:rgba(255,255,255,.3)}
.cta-band{padding:100px 40px;text-align:center}
.cta-band h2{font-size:clamp(32px,5vw,52px);font-weight:800;margin-bottom:16px}
.cta-band p{font-size:16px;color:var(--c-sub);margin-bottom:32px}
.cta-band .ctas{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.faq-section{padding:80px 40px;background:var(--c-bg-alt)}
.faq-section h2{text-align:center;margin-bottom:48px}
.faq{max-width:700px;margin:0 auto}
.faq-item{border-bottom:1px solid var(--c-border)}
.faq-q{display:flex;justify-content:space-between;align-items:center;padding:18px 0;cursor:pointer;font-size:14px;font-weight:600;gap:16px}
.faq-q .ico{font-size:18px;color:var(--c-sub);flex-shrink:0;line-height:1;transition:.2s}
.faq-item.open .faq-q .ico{transform:rotate(45deg)}
.faq-a{font-size:14px;color:var(--c-sub);line-height:1.6;max-height:0;overflow:hidden;transition:max-height .3s,padding .3s}
.faq-item.open .faq-a{max-height:200px;padding-bottom:16px}
footer{background:var(--c-bg-alt);padding:60px 40px 32px;border-top:1px solid var(--c-border)}
.footer-inner{max-width:var(--max);margin:0 auto}
.footer-top{display:grid;grid-template-columns:1fr 1fr 1fr 1fr 1fr;gap:32px;padding-bottom:40px;border-bottom:1px solid var(--c-border)}
.footer-col h4{font-size:12px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--c-sub);margin-bottom:14px}
.footer-col a{display:block;font-size:13px;color:var(--c-sub);margin-bottom:8px;cursor:pointer}
.footer-col a:hover{color:var(--c-text)}
.footer-bottom{padding-top:24px;display:flex;justify-content:space-between;align-items:center}
.footer-brand{font-size:13px;font-weight:700}
.footer-copy{font-size:12px;color:var(--c-sub)}
.stats-row{display:flex;gap:0;border-top:1px solid var(--c-border);border-bottom:1px solid var(--c-border);margin:48px 0;padding-top:32px}
.stat{flex:1;padding:32px 24px;border-right:1px solid var(--c-border);text-align:center;display:flex;flex-direction:column;align-items:center}
.stat:last-child{border-right:none}
.stat .num{font-size:clamp(48px,7vw,80px);font-weight:800;letter-spacing:-0.02em;line-height:1;color:var(--c-text)}
.stat .label{font-size:14px;color:var(--c-sub);margin-top:6px;max-width:140px}
.int-row{display:flex;gap:12px;flex-wrap:wrap;margin-top:32px}
.int-chip{background:#111;color:#fff;padding:10px 18px;border-radius:6px;font-size:12px;font-weight:600;letter-spacing:.04em}
.filter-bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:40px}
.filter-pill{padding:7px 16px;border-radius:20px;font-size:13px;font-weight:500;border:1px solid var(--c-border);background:#fff;color:var(--c-sub);cursor:pointer;transition:.15s}
.filter-pill:hover{border-color:#999;color:var(--c-text)}
.filter-pill.active{background:var(--c-text);color:#fff;border-color:var(--c-text)}
.card-tag{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;background:var(--c-bg-alt);color:var(--c-sub);margin-right:4px;margin-top:8px}
.card-hidden{display:none}
.card-snippet{font-size:14px;font-weight:700;color:var(--c-text);margin:6px 0 10px;line-height:1.3}
.card-ghost{border-style:dashed;color:var(--c-sub);background:transparent;display:flex;align-items:center;justify-content:center;text-align:center;cursor:pointer;min-height:140px;font-size:14px;font-weight:500;transition:.15s}
.card-ghost:hover{border-color:var(--c-text);color:var(--c-text)}
.filter-count{font-size:13px;color:var(--c-sub);margin:-24px 0 24px}
.tcard{background:#fff;border:1px solid var(--c-border);border-radius:8px;padding:24px;display:flex;flex-direction:column;gap:18px}
.tcard-head{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.tcard-avatar{width:48px;height:48px;border-radius:50%;object-fit:cover;flex-shrink:0;display:flex;align-items:center;justify-content:center;background:var(--c-bg-alt);color:var(--c-text);font-size:15px;font-weight:700;letter-spacing:.02em;overflow:hidden}
.tcard-meta{flex:1;min-width:0}
.tcard-name{font-size:14px;font-weight:700;color:var(--c-text);line-height:1.2}
.tcard-role{font-size:12px;color:var(--c-sub);margin-top:2px;line-height:1.3}
.tcard-logo-pill{font-size:11px;font-weight:600;color:var(--c-sub);background:var(--c-bg-alt);border:1px solid var(--c-border);padding:6px 10px;border-radius:4px;letter-spacing:.04em;text-transform:uppercase;margin-left:auto;white-space:nowrap}
.tcard-quote{font-size:17px;font-weight:500;color:var(--c-text);line-height:1.4;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;margin:0;quotes:"\201C""\201D""\2018""\2019"}
.tcard-quote::before{content:open-quote}
.tcard-quote::after{content:close-quote}
.tcard-quote-sm{font-size:13px;color:var(--c-sub);line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin:0;font-style:italic;quotes:"\201C""\201D""\2018""\2019"}
.tcard-quote-sm::before{content:open-quote}
.tcard-quote-sm::after{content:close-quote}
.tcard-stat-num{font-size:56px;font-weight:800;letter-spacing:-0.02em;line-height:1;color:var(--c-text)}
.tcard-stat-label{font-size:13px;color:var(--c-sub);margin-top:6px;line-height:1.3}
.tcard-stat-sm{display:flex;align-items:baseline;gap:8px}
.tcard-stat-num-sm{font-size:20px;font-weight:800;color:var(--c-text)}
.tcard-stat-label-sm{font-size:12px;color:var(--c-sub)}
.tcard-inline{max-width:520px;margin:32px auto 0}
.int-catalog{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:20px}
.int-card{display:flex;gap:12px;align-items:center;padding:16px;border:1px solid var(--c-border);border-radius:6px;background:#fff;transition:.15s}
.int-card:hover{border-color:#999}
.int-logo{width:40px;height:40px;border-radius:8px;background:var(--c-bg-alt);color:var(--c-text);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;letter-spacing:.02em}
.int-name{font-size:14px;font-weight:700;color:var(--c-text);line-height:1.2}
.int-desc{font-size:12px;color:var(--c-sub);margin-top:3px;line-height:1.35}
.int-body{min-width:0;flex:1}
.int-category{margin-bottom:40px}
.int-category[data-cat-hidden]{display:none}
.int-footnote{font-size:12px;color:var(--c-sub);font-style:italic;margin-top:8px;text-align:center}
@media(max-width:900px){.int-catalog{grid-template-columns:repeat(2,1fr)}}
@media(max-width:560px){.int-catalog{grid-template-columns:1fr}}
@media(max-width:700px){
nav{padding:0 20px}
.nav-links{display:none}
.hero{padding:60px 20px 70px}
.hero-right{display:none}
section,footer,.cta-band,.what-you-get,.faq-section,.logo-strip-section{padding-left:20px;padding-right:20px}
.card-grid{grid-template-columns:1fr 1fr}
.footer-top{grid-template-columns:1fr 1fr}
.stats-row{flex-wrap:wrap}
.steps-wrap{grid-template-columns:1fr}
}
</style>
</head>

function buildNav(){
  const d=CONTENT.nav,n=document.getElementById('nav');
  const logo=document.createElement('div');
  logo.className='nav-logo';
  logo.textContent=CONTENT.brand;
  logo.onclick=()=>route('home');
  
  const links=document.createElement('div');
  links.className='nav-links';

  function directLink(label,page){
    const a=document.createElement('a');
    a.textContent=label;
    a.onclick=()=>route(page);
    links.appendChild(a);
  }

  function buildDropdown(label,items,itemRouter,hubPage){
    const dd=document.createElement('div');
    dd.className='nav-dropdown';
    dd.innerHTML='<span'+(hubPage?' style="cursor:pointer"':'')+'>'+label+'</span>';
    if(hubPage){
      dd.querySelector('span').addEventListener('click',(e)=>{
        e.stopPropagation();
        route(hubPage);
      });
    }
    const menu=document.createElement('div');
    menu.className='dropdown-menu';
    items.forEach(s=>{
      if(s.divider){
        const div=document.createElement('div');
        div.style.cssText='font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--c-sub);padding:14px 12px 6px;margin-top:6px;border-top:1px solid var(--c-border)';
        div.textContent=s.divider;
        menu.appendChild(div);
        return;
      }
      const a=document.createElement('a');
      a.innerHTML='<span style="display:block;font-size:13px;font-weight:600;color:var(--c-text)">'+s.label+'</span>'+(s.sub?'<span style="display:block;font-size:11px;color:var(--c-sub);margin-top:2px;font-weight:400;line-height:1.4">'+s.sub+'</span>':'');
      itemRouter(a,s);
      menu.appendChild(a);
    });
    dd.appendChild(menu);
    let ct;
    dd.addEventListener('mouseenter',()=>{clearTimeout(ct);dd.classList.add('open');});
    dd.addEventListener('mouseleave',()=>{ct=setTimeout(()=>dd.classList.remove('open'),120);});
    links.appendChild(dd);
  }

  function pageRouter(a,s){
    a.onclick=(e)=>{
      e.stopPropagation();
      if(!s.page || s.page==='#'){e.preventDefault();return;}
      route(s.page);
    };
  }

  buildDropdown('Platform',d.platform,pageRouter);

  buildDropdown('Solutions',d.solutions,pageRouter,'solutions');

  directLink('Enterprise','enterprise');

  buildDropdown('Partners',d.partners,pageRouter);

  if(d.resources){
    buildDropdown('Resources',d.resources,(a,r)=>{
      if(r.page){
        a.onclick=(e)=>{e.stopPropagation();route(r.page);};
      } else if(r.href && r.href!=='#' && !r.href.startsWith('http')){
        a.onclick=(e)=>{e.stopPropagation();route(r.href);};
      } else if(r.href==='#' || !r.href){
        a.setAttribute('title','Coming soon');
        a.style.cursor='not-allowed';
        a.querySelectorAll('span').forEach(s=>{s.style.color='#d1341f';});
        a.onclick=(e)=>e.preventDefault();
      } else {
        a.href=r.href;
      }
    },'resources');
  }
  
  const cta=document.createElement('a');
  cta.className='btn btn-primary';
  cta.textContent=d.cta;
  cta.href=d.ctaUrl;
  
  n.appendChild(logo);
  n.appendChild(links);
  n.appendChild(cta);
}

function testimonialCard(c){
  const initials=(c.name||'').split(/\s+/).filter(Boolean).map(w=>w[0]).slice(0,2).join('').toUpperCase();
  const avatarHTML=c.avatar
    ?`<img src="${c.avatar}" alt="${c.name||c.company||''}" class="tcard-avatar">`
    :`<div class="tcard-avatar">${initials||'·'}</div>`;
  const metaHTML=`<div class="tcard-meta"><div class="tcard-name">${c.name||c.company||''}</div><div class="tcard-role">${c.role||''}${c.role&&c.company?' · ':''}${c.company&&c.name?c.company:''}</div></div>`;
  const logoHTML=c.company?`<div class="tcard-logo-pill">${c.company}</div>`:'';
  const statBig=`<div><div class="tcard-stat-num">${c.stat||''}</div><div class="tcard-stat-label">${c.statLabel||''}</div></div>`;
  const quoteBig=`<blockquote class="tcard-quote">${c.quote||''}</blockquote>`;
  const statSm=`<div class="tcard-stat-sm"><span class="tcard-stat-num-sm">${c.stat||''}</span><span class="tcard-stat-label-sm">${c.statLabel||''}</span></div>`;
  const quoteSm=`<blockquote class="tcard-quote-sm">${c.quote||''}</blockquote>`;
  const primary=c.variant==='stat'?statBig:quoteBig;
  const secondary=c.variant==='stat'?quoteSm:statSm;
  return `<div class="tcard tcard-${c.variant}"><div class="tcard-head">${avatarHTML}${metaHTML}${logoHTML}</div>${primary}${secondary}</div>`;
}

  const featured=d.featured?`<section><div class="wrap"><h2>${d.featured.headline}</h2><p class="section-sub">${d.featured.sub}</p><div class="card-grid" style="grid-template-columns:repeat(3,1fr)">${d.featured.cards.map(c=>`<div class="card" style="border-left:3px solid #111"><h3>${c.client}</h3><p style="font-size:14px;font-weight:700;color:var(--c-text);margin:6px 0 10px">${c.stat}</p><p>${c.outcome}</p>${c.href?`<a href="${c.href}" class="card-link">Read case study →</a>`:''}</div>`).join('')}</div></div></section>`:'';
  const fb=`<div class="filter-bar" id="cust-filters">${d.filters.map((f,i)=>`<button class="filter-pill${i===0?' active':''}" data-filter="${f}">${f}</button>`).join('')}</div>`;
  const gridHeading=`<div class="section-label" style="margin-bottom:16px">More customer proof</div>`;
  const countEl=`<div id="cust-count" class="filter-count">${d.cards.length} stories</div>`;
  const ghostCard=`<div class="card card-ghost" onclick="route('contact-us')"><div>Your brand · [Your vertical] · Make the switch →</div></div>`;
  const cg=`<div class="card-grid" id="cust-cards">${d.cards.map(c=>{
    const agencyBadge=c.agencyPartner?`<span class="card-tag" style="background:#111;color:#fff">Agency Partner</span>`:'';
    const agencyStyle=c.agencyPartner?'style="border-left:3px solid #111"':'';
    const snippetHTML=c.snippet?`<p class="card-snippet">${c.snippet}</p>`:'';
    return `<div class="card" data-tags="${c.tags.join(',')}" ${agencyStyle}><h3>${c.client}</h3>${snippetHTML}<p>${c.outcome}</p><div>${agencyBadge}${c.tags.filter(t=>t!=='Agency Partner').map(t=>`<span class="card-tag">${t}</span>`).join('')}</div><p class="proof">${c.proof}</p></div>`;
  }).join('')}${ghostCard}</div>`;
  const tr=`<section><div class="wrap"><div class="two-col"><div class="col-text"><h2>${d.transition.headline}</h2><p class="section-sub">${d.transition.sub}</p><a href="#" onclick="event.preventDefault();route('platform')" style="font-size:14px;font-weight:600;text-decoration:underline;text-underline-offset:3px">${d.transition.link}</a></div><div class="col-img">${imgP()}</div></div></div></section>`;
  p.innerHTML=heroSection(d,false)+trust+statsHeader+featured+`<section class="alt"><div class="wrap">${gridHeading}${fb}${countEl}${cg}</div></section>`+tr+ctaBand(d.ctaband)+faqSection(d.faq)+footerHTML();
  const countNode=p.querySelector('#cust-count');
  function updateCustCount(f){
    const visible=p.querySelectorAll('#cust-cards .card:not(.card-ghost):not(.card-hidden)').length;
    countNode.textContent=f==='All'?`${visible} stories`:`${visible} ${visible===1?'story':'stories'} in ${f}`;
  }
  p.querySelector('#cust-filters').addEventListener('click',e=>{
    const btn=e.target.closest('.filter-pill');
    if(!btn)return;
    p.querySelectorAll('.filter-pill').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    const f=btn.dataset.filter;
    p.querySelectorAll('#cust-cards .card:not(.card-ghost)').forEach(card=>{
      card.classList.toggle('card-hidden',f!=='All'&&!card.dataset.tags.split(',').includes(f));
    });
    updateCustCount(f);
  });
}

function buildPlatformIntegrations(){
  const d=CONTENT.platformIntegrations,p=document.getElementById('page-platform-integrations');
  const intInitials=n=>{const w=(n||'').split(/\s+/).filter(Boolean);if(!w.length)return'·';if(w.length===1)return w[0].slice(0,2).toUpperCase();return w.slice(0,2).map(x=>x[0]).join('').toUpperCase();};
  const catalogHeader=d.catalogHeading?`<h2 style="margin-bottom:24px">${d.catalogHeading}</h2>`:'';
  const filters=['All',...d.categories.map(c=>c.label)];
  const filterBar=`<div class="filter-bar" id="int-filters">${filters.map((f,i)=>`<button class="filter-pill${i===0?' active':''}" data-filter="${f}">${f}</button>`).join('')}</div>`;
  const cats=d.categories.map(c=>{
    const cards=c.items.map(it=>`<div class="int-card"><div class="int-logo">${intInitials(it.name)}</div><div class="int-body"><div class="int-name">${it.name}</div><div class="int-desc">${it.desc}</div></div></div>`).join('');
    return `<div class="int-category" data-cat="${c.label}"><div class="section-label" style="margin-bottom:8px">${c.label}</div><div class="int-catalog">${cards}</div></div>`;
  }).join('');
  const footnote=d.footnote?`<p class="int-footnote">${d.footnote}</p>`:'';
  const ecosystem=d.shopifyEcosystem?`<section class="alt"><div class="wrap"><div class="two-col"><div class="col-text"><h2>${d.shopifyEcosystem.headline}</h2><p class="section-sub">${d.shopifyEcosystem.sub}</p></div><div class="col-img">${imgP()}</div></div></div></section>`:'';
  p.innerHTML=heroSection(d,false)+
  `<section><div class="wrap">${catalogHeader}${filterBar}<div id="int-cats">${cats}</div>${footnote}</div></section>`+
  ecosystem+
  `<section><div class="wrap"><div class="two-col"><div class="col-img">${imgP()}</div><div class="col-text"><h2>${d.custom.headline}</h2><p class="section-sub">${d.custom.sub}</p><a href="${d.cta1Url}" class="btn btn-outline-dark">${d.custom.cta}</a></div></div></div></section>`+
  ctaBand(d.cta_band)+faqSection(d.faq)+footerHTML();
  p.querySelector('#int-filters').addEventListener('click',e=>{
    const btn=e.target.closest('.filter-pill');
    if(!btn)return;
    p.querySelectorAll('#int-filters .filter-pill').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    const f=btn.dataset.filter;
    p.querySelectorAll('#int-cats .int-category').forEach(cat=>{
      if(f==='All'||cat.dataset.cat===f) cat.removeAttribute('data-cat-hidden');

    });
  });

function route(page){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  const t=document.getElementById('page-'+page);
  if(t){
    t.classList.add('active');
    window.scrollTo(0,0);
  }
  document.querySelectorAll('.nav-links a').forEach(a=>{
    const pg=a.textContent.toLowerCase().replace(/ /g,'');
    a.classList.toggle('active',pg===page);
  });
  history.pushState(null,'','#'+page);
}
